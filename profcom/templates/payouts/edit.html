{% extends 'base.html' %}
{% from 'base.html' import icon %}
{% block title %}Редактировать выплату{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Редактировать выплату</h1>
  <a href="{{ url_for('payouts.index') }}" class="btn btn-outline-secondary">{{ icon('arrow-left') }} Назад</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post" id="payout-form">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Член профсоюза</label>
          <select name="member_id" class="form-select" disabled>
            <option value="{{ payout.member.id }}" selected>{{ payout.member.full_name }}</option>
          </select>
          <input type="hidden" name="member_id" value="{{ payout.member.id }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Тип выплаты</label>
          <select name="type_id" id="type_id" class="form-select" required>
            {% for t in types %}
            <option value="{{ t.id }}" data-amount="{{ t.default_amount }}" {% if payout.type_id == t.id %}selected{% endif %}>{{ t.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Сумма, ₽</label>
          <input type="number" step="0.01" name="amount" id="amount" class="form-control" value="{{ payout.amount }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Дата</label>
          <input type="date" name="date" class="form-control" value="{{ payout.date.strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Протокол</label>
          <select name="protocol_id" class="form-select">
            <option value="">-</option>
            {% for pr in protocols %}
            <option value="{{ pr.id }}" {% if payout.protocol_id == pr.id %}selected{% endif %}>{{ pr.number }} от {{ pr.date|dt }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="signed" id="signed" value="1" {% if payout.signed %}checked{% endif %}>
            <label class="form-check-label" for="signed">Ведомость подписана</label>
          </div>
        </div>
      </div>
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">{{ icon('floppy') }} Сохранить</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
