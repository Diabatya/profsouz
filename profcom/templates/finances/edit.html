{% extends 'base.html' %}
{% from 'base.html' import icon %}
{% block title %}Редактировать финансовую запись{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Редактировать запись</h1>
  <a href="{{ url_for('finances.index') }}" class="btn btn-outline-secondary">{{ icon('arrow-left') }} Назад</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Описание</label>
          <input type="text" name="description" class="form-control" list="descriptions" value="{{ record.description }}" required>
          <datalist id="descriptions">
            {% for value in descriptions %}
            <option value="{{ value }}">
            {% endfor %}
          </datalist>
        </div>
        <div class="col-md-3">
          <label class="form-label">Сумма, ₽</label>
          <input type="number" step="0.01" name="amount" class="form-control" value="{{ record.amount }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Дата</label>
          <input type="date" name="date" class="form-control" value="{{ record.date.strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Тип</label>
          <select name="type" id="finance-type" class="form-select" required>
            <option value="income" {% if record.type == 'income' %}selected{% endif %}>Доход</option>
            <option value="expense" {% if record.type == 'expense' %}selected{% endif %}>Расход</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Категория</label>
          <input type="text" name="category" class="form-control" list="categories" value="{{ record.category }}">
          <datalist id="categories">
            {% for value in categories %}
            <option value="{{ value }}">
            {% endfor %}
          </datalist>
        </div>
        <div class="col-md-4" id="fund-wrapper" style="display:none;">
          <label class="form-label">Фонд списания</label>
          <select name="fund_id" class="form-select">
            {% for f in funds %}
            <option value="{{ f.id }}" {% if f.id == selected_fund_id %}selected{% endif %}>{{ f.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">{{ icon('floppy') }} Сохранить</button>
      </div>
    </form>
  </div>
</div>

{% block extra_js %}
<script>
  const typeSelect = document.getElementById('finance-type');
  const fundWrapper = document.getElementById('fund-wrapper');
  function toggleFund() {
    fundWrapper.style.display = typeSelect.value === 'expense' ? 'block' : 'none';
  }
  typeSelect.addEventListener('change', toggleFund);
  toggleFund();
</script>
{% endblock %}
