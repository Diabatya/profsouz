{% extends 'base.html' %}
{% from 'base.html' import icon %}
{% block title %}Добавить финансовую запись{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Добавить запись</h1>
  <a href="{{ url_for('finances.index') }}" class="btn btn-outline-secondary">{{ icon('arrow-left') }} Назад</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Описание</label>
          <input type="text" name="description" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Сумма, ₽</label>
          <input type="number" step="0.01" name="amount" class="form-control" value="0.00" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Дата</label>
          <input type="date" name="date" class="form-control" value="{{ today().strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Тип</label>
          <select name="type" class="form-select" required>
            <option value="income">Доход</option>
            <option value="expense">Расход</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Категория</label>
          <input type="text" name="category" class="form-control" list="categories" placeholder="взносы, прочее">
          <datalist id="categories">
            <option value="взносы">
            <option value="прочее">
          </datalist>
        </div>
      </div>
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">{{ icon('floppy') }} Сохранить</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
