{% extends 'base.html' %}
{% from 'base.html' import icon %}
{% block title %}Добавить ТМЦ{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Добавить ТМЦ</h1>
  <a href="{{ url_for('inventory.index') }}" class="btn btn-outline-secondary">Назад</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post" class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Инвентарный номер *</label>
        <input type="text" name="inventory_number" class="form-control" required>
      </div>
      <div class="col-md-8">
        <label class="form-label">Наименование *</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <div class="col-12">
        <label class="form-label">Описание</label>
        <textarea name="description" class="form-control" rows="2"></textarea>
      </div>
      <div class="col-md-3">
        <label class="form-label">Количество</label>
        <input type="number" step="0.01" name="quantity" class="form-control" value="1">
      </div>
      <div class="col-md-2">
        <label class="form-label">Ед. изм.</label>
        <input type="text" name="unit" class="form-control" value="шт.">
      </div>
      <div class="col-md-3">
        <label class="form-label">Дата поступления</label>
        <input type="date" name="acquisition_date" class="form-control">
      </div>
      <div class="col-md-2">
        <label class="form-label">Гарантия, лет</label>
        <input type="number" name="warranty_term_years" class="form-control" value="0">
      </div>
      <div class="col-md-2">
        <label class="form-label">Списать через, лет</label>
        <input type="number" name="write_off_term_years" class="form-control" value="0">
      </div>
      <div class="col-md-2">
        <label class="form-label">Место хранения</label>
        <input type="text" name="location" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Ответственный</label>
        <select name="responsible_member_id" class="form-select">
          <option value="">-</option>
          {% for m in members %}
          <option value="{{ m.id }}">{{ m.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">{{ icon('floppy') }} Сохранить</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
